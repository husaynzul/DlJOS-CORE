kind = "web"
previewPath = "/"
title = "DLJAIS — AI Action OS"
version = "1.0.0"
id = "artifacts/dljais"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19665

[services.development]
run = "pnpm --filter @workspace/dljais run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dljais", "run", "build" ]
publicDir = "artifacts/dljais/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19665"
BASE_PATH = "/"
